{% extends 'base.html' %}

{% block header %}
  <h1>{% block title %}Sources{% endblock %}</h1>
{% endblock %}

{% block content %}
<p class="d-inline-flex gap-1">
  <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#collapseCreate" aria-expanded="false" aria-controls="collapseCreate">
    Add new data source
  </button>
</p>
<div class="collapse" id="collapseCreate">
  <div class="card card-body">

    <div class="accordion" id="accordionCreate">
      <div class="accordion-item">
        <h2 class="accordion-header">
          <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseCreateLocal" aria-expanded="false" aria-controls="collapseCreateLocal">
            Local file or directory
          </button>
        </h2>
        <div id="collapseCreateLocal" class="accordion-collapse collapse" data-bs-parent="#accordionCreate">
          <div class="accordion-body">
            <form method="POST">
              <input type="hidden" name="type" value="local"/>
              <div class="mb-3">
                <label for="label" class="form-label">Label</label>
                <input class="form-control" name="label">
              </div>
              <div class="mb-3">
                <label for="url" class="form-label">Local filesystem path</label>
                <input class="form-control" name="path" placeholder="/home/user/Documents">
              </div>
              <button type="submit" class="btn btn-primary">Save</button>
            </form>
          </div>
        </div>
      </div>
      <div class="accordion-item">
        <h2 class="accordion-header">
          <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseCreateWeb" aria-expanded="false" aria-controls="collapseCreateWeb">
            Web page
          </button>
        </h2>
        <div id="collapseCreateWeb" class="accordion-collapse collapse" data-bs-parent="#accordionCreate">
          <div class="accordion-body">
            <form method="POST">
              <input type="hidden" name="type" value="web"/>
              <div class="mb-3">
                <label for="label" class="form-label">Label</label>
                <input class="form-control" name="label">
              </div>
              <div class="mb-3">
                <label for="url" class="form-label">URL</label>
                <input class="form-control" name="path" placeholder="https://example.com/">
              </div>
              <button type="submit" class="btn btn-primary">Save</button>
            </form>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<table class="table">
  <thead>
    <tr>
      <th scope="col">#</th>
      <th scope="col">Label</th>
      <th scope="col">Path</th>
      <th scope="col"></th>
    </tr>
  </thead>
  <tbody>
    {% for name, item in sources.items() %}
    <tr>
      <th scope="row">{{ name }}</th>
      <td>{{ item.label }}</td>
      <td>{{ item.path }}</td>
      <td>
        <form method="POST" action="{{ url_for('source_action', source=name) }}">
          <div class="btn-group" role="group">
            <button type="submit" class="btn btn-danger" name="action" value="delete">Remove</button>
          </div>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
