name: optimization
label: Optimize
ports:
  # TODO: labels in the interface currently assume a specific port order
  - ui
  - qdrant_http
files:
  - path: '{{storage_path}}/basic_user_config.json'
    content: |
      {
          "collection_name": "learn2rag",
          "imported_documents_file_path": "loaded_documents.json",
          "llm": "{{language_model.model}}"
      }
  - path: '{{storage_path}}/opt_config.json'
    src: '{{learn2rag_path}}/learn2rag/pipeline/opt_config.json'
    force: false
  - path: '{{storage_path}}/qdrant_config.yml'
    content: |
      log_level: INFO
      service:
        api_key: '{{qdrant_api_key}}'
        grpc_port: null
        http_port: '{{ports.qdrant_http}}'
        host: '127.0.0.1'
      telemetry_disabled: true
  - path: '{{storage_path}}/logging_config.yml'
    content: |
      version: 1
      formatters:
        simple:
          format: "%(asctime)s %(levelname)-8s %(name)s %(message)s"
        colored:
          class: colorlog.ColoredFormatter
          format: "%(log_color)s%(asctime)s %(levelname)-8s %(name)s %(message)s"
        profiling:
          format: "%(created)f %(request_id)s %(activity)s %(message)s"
      handlers:
        display:
          class: logging.StreamHandler
          level: INFO
          formatter: colored
          stream: ext://sys.stderr
        profiling_display:
          class: logging.StreamHandler
          formatter: profiling
          stream: ext://sys.stderr
        profiling_file:
          class: logging.FileHandler
          formatter: profiling
          filename: '{{storage_path}}/logs/profiling.log'
          encoding: utf-8
        errors_file:
          class: logging.FileHandler
          level: ERROR
          formatter: simple
          filename: '{{storage_path}}/logs/error.log'
          encoding: utf-8
        {% if debug_logging %}
        debug_file:
          class: logging.FileHandler
          level: DEBUG
          formatter: simple
          filename: '{{storage_path}}/logs/debug.log'
          encoding: utf-8
        {% endif %}
      loggers:
        profiling:
          handlers:
            - profiling_display
            - profiling_file
          propagate: no
      root:
        level: DEBUG
        handlers:
          - display
          - errors_file
          {% if debug_logging %}
          - debug_file
          {% endif %}

  - path: '{{storage_path}}/logs/.keep'
    content: ''

services:
  qdrant:
    working_dir: '{{storage_path}}'
    command:
      - '{{learn2rag_path}}/services/qdrant/qdrant{% if is_windows %}.exe{% endif %}'
      - '--config-path'
      - '{{storage_path}}/qdrant_config.yml'
    # https://qdrant.tech/documentation/guides/configuration/
    environment:
      QDRANT__LOG_LEVEL: 'ERROR'
      QDRANT__SERVICE__HOST: '127.0.0.1'
      QDRANT__SERVICE__HTTP_PORT: '{{ports.qdrant_http}}'
      QDRANT__TELEMETRY_DISABLED: 'true'
  main:
    working_dir: '{{storage_path}}'
    command:
      - '{{learn2rag_path}}/configurator{% if is_windows %}.exe{% endif %}'
      - 'learn2rag.optimization'
      - '--logging-config'
      - '{{storage_path}}/logging_config.yml'
      - '--registry-path'
      - '{{learn2rag_path}}/learn2rag/optimization/registry.json'
    environment:
      LEARN2RAG_PATH: '{{learn2rag_path}}'
      QDRANT__SERVICE__HTTP_PORT: '{{ports.qdrant_http}}'
      QDRANT__SERVICE__API_KEY: '{{qdrant_api_key}}'
      PIPELINE_USER_CONFIG: '{{storage_path}}/basic_user_config.json'
      IMPORTER_CONFIG: '{{storage_path}}/importer_config.json'
      PIPELINE_OPT_CONFIG: '{{storage_path}}/opt_config.json'
      LANGCHAIN_API_KEY: '1'
      LANGCHAIN_TRACING_V2: 'false'
      LLM_API_TYPE: '{{language_model.api}}'
      LLM_API_URL: '{{language_model.url}}'
      LLM_API_TOKEN: '{{language_model.token}}'
      LLM_API_MODEL: '{{language_model.model}}'
