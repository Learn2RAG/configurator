name: import
label: Import
ports:
  # TODO: UI port is not used; labels in the interface currently assume a specific port order
  - ui
  - qdrant_http
files:
  - path: '{{storage_path}}/importer_config.json'
    content: |
      {
          "loaders": [
              {% for name, source in sources.items() %}
              {
                  "loader_type": "DirectoryLoader",
                  "path": "{{source.path | replace('\\', '\\\\')}}",
                  "recursive": "True"
              }
              {% if not loop.last %}
              ,
              {% endif %}
              {% endfor %}
          ]
      }

  - path: '{{storage_path}}/basic_user_config.json'
    content: |
      {
          "collection_name": "learn2rag",
          "imported_documents_file_path": "loaded_documents.json",
          "llm": "{{language_model.model}}"
      }

  - path: '{{storage_path}}/logging_config.yml'
    content: |
      version: 1
      formatters:
        simple:
          format: "%(asctime)s %(levelname)-8s %(name)s %(message)s"
        colored:
          class: colorlog.ColoredFormatter
          format: "%(log_color)s%(asctime)s %(levelname)-8s %(name)s %(message)s"
      handlers:
        display:
          class: logging.StreamHandler
          level: INFO
          formatter: colored
          stream: ext://sys.stderr
        errors_file:
          class: logging.FileHandler
          level: ERROR
          formatter: simple
          filename: '{{storage_path}}/logs/error.log'
          encoding: utf-8
        {% if debug_logging %}
        debug_file:
          class: logging.FileHandler
          level: DEBUG
          formatter: simple
          filename: '{{storage_path}}/logs/debug.log'
          encoding: utf-8
        {% endif %}
      root:
        level: DEBUG
        handlers:
          - display
          - errors_file
          {% if debug_logging %}
          - debug_file
          {% endif %}

  - path: '{{storage_path}}/logs/.keep'
    content: ''

services:
  qdrant:
    working_dir: '{{storage_path}}'
    command:
      - '{{learn2rag_path}}/services/qdrant/qdrant{% if is_windows %}.exe{% endif %}'
      - '--config-path'
      - '{{learn2rag_path}}/qdrant/config.yml'
    environment:
      # https://qdrant.tech/documentation/guides/configuration/
      QDRANT__LOG_LEVEL: 'INFO'
      QDRANT__SERVICE__HOST: '127.0.0.1'
      QDRANT__SERVICE__HTTP_PORT: '{{ports.qdrant_http}}'
      QDRANT__TELEMETRY_DISABLED: 'true'
  main:
    working_dir: '{{storage_path}}'
    command:
      - '{{learn2rag_path}}/services/start-import{% if is_windows %}.bat{% endif %}'
    environment:
      LEARN2RAG_PATH: '{{learn2rag_path}}'
      STORAGE_PATH: '{{storage_path}}'
      QDRANT__SERVICE__HTTP_PORT: '{{ports.qdrant_http}}'
      PIPELINE_USER_CONFIG: '{{storage_path}}/basic_user_config.json'
      PIPELINE_OPT_CONFIG: '{{learn2rag_path}}/learn2rag/pipeline/opt_config.json'
      LANGCHAIN_API_KEY: '1'
      LANGCHAIN_TRACING_V2: 'false'
      LLM_API_TYPE: '{{language_model.api}}'
      LLM_API_URL: '{{language_model.url}}'
      LLM_API_TOKEN: '{{language_model.token}}'
      LLM_API_MODEL: '{{language_model.model}}'
