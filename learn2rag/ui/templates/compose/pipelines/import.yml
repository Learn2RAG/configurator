name: import
ports:
  - redis
files:
  - path: "{{pipeline.storage_path}}/importer_config.json"
    content: |
      {
          "loaders": [
              {% for name, source in sources.items() %}
              {
                  "loader_type": "DirectoryLoader",
                  "path": "{{source.path}}",
                  "recursive": "True"
              }
              {% if not loop.last %}
              ,
              {% endif %}
              {% endfor %}
          ]
      }
services:
  main:
    working_dir: "{{pipeline.storage_path}}"
    command:
      - "{{learn2rag_path}}/services/importer/.venv/bin/python3"
      - "{{learn2rag_path}}/services/importer/main.py"
      - "--config"
      - "{{pipeline.storage_path}}/importer_config.json"
