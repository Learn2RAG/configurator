services:
  ollama:
    command: ['{{learn2rag_path}}/services/ollama/{% if not is_windows %}bin/{% endif %}ollama{% if is_windows %}.exe{% endif %}', 'serve']
    environment:
      OLLAMA_HOST: 'http://127.0.0.1:{{port}}'
      OLLAMA_MODELS: '{{storage_path}}/ollama/models'
      OLLAMA_NOHISTORY: 'true'
      OLLAMA_TMPDIR: '{{storage_path}}/ollama/tmp'
