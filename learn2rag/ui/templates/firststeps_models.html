<div class="alert alert-secondary" role="alert">
  <h4 class="alert-heading">You do not have any models configured</h4>
  <p>Do you want to download a suggested model now?</p>
  <hr/>
  <div class="btn-toolbar mb-3" role="toolbar">
    {% if ollama_available %}
    <div class="input-group">
      <form method="POST" action="{{ url_for('model_create') }}">
        <input type="hidden" name="label" value="tinyllama">
        <input type="hidden" name="model" value="tinyllama:latest">
        <input type="hidden" name="ollama" value="pull"/>
        <button type="submit" class="btn btn-primary">🪄 Yes, download a suggested model (tinyllama)</button>
      </form>
    </div>
    {% endif %}
    <div class="btn-group me-2" role="group">
      <a href="{{ url_for('models_list') }}" class="btn btn-link">More options</a>
    </div>
  </div>
</div>
