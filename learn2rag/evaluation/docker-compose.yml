version: '3.3'
services:
  qdrant:
    image: qdrant/qdrant:v1.14.1
    container_name: qdrant
    ports:
      - 6336:6333
      - 6334:6334
    configs:
      - source: qdrant_config
        target: /qdrant/config/production.yaml
    volumes:
      - ./qdrant_data:/qdrant/storage
volumes:
  open-webui-data:
  open-webui-pipelines:
configs:
  qdrant_config:
    content: |
      log_level: INFO
      telemetry_disabled: true
