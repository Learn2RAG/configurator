[project]
name = "learn2rag"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "build==1.3.0",
    "Flask>=3.1.1",
    "Flask-Babel>=4.0.0",
    "ollama>=0.5.1",
    "psutil>=7.0.0",
    "pyyaml>=0.2.5",
    "uvicorn",
]
[build-system]
requires = ["setuptools >= 77.0.3"]
build-backend = "setuptools.build_meta"
[tool.setuptools]
include-package-data = true
[tool.setuptools.package-data]
"*" = ["**/*"]
[tool.setuptools.packages.find]
where = ["."]
include = ["learn2rag*"]
namespaces = false
